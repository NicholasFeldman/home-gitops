apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: snipe-it

resources:
  - snipeit.virtualservice.yaml
  - snipeit.sealed-secret.yaml

helmCharts:
  - name: app-template
    repo: https://bjw-s-labs.github.io/helm-charts
    releaseName: snipeit
    version: 4.6.2
    valuesFile: ../values/snipeit.yaml
